name: Bug Report
description: Report a bug
title: 'bug: '
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Prerequisites
      options:
        - label:
            I have searched [existing
            issues](https://github.com/barrettruth/forge.nvim/issues)
          required: true
        - label: I have updated to the latest version
          required: true

  - type: textarea
    attributes:
      label: 'Neovim version'
      description: 'Output of `nvim --version`'
      render: text
    validations:
      required: true

  - type: input
    attributes:
      label: 'Operating system'
      placeholder: 'e.g. Arch Linux, macOS 15, Ubuntu 24.04'
    validations:
      required: true

  - type: textarea
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 'Health check'
      description: 'Output of `:checkhealth forge`'
      render: text

  - type: textarea
    attributes:
      label: 'Forge CLI version'
      description: 'Output of `gh --version`, `glab --version`, or `tea --version`'
      render: text
